name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch videoedit
        shell: bash
        env:
          CROSS_REPO_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          if [ -n "$CROSS_REPO_TOKEN" ]; then
            git clone --depth 1 --branch main "https://x-access-token:${CROSS_REPO_TOKEN}@github.com/xolvco/videoedit.git" videoedit
          else
            git clone --depth 1 --branch main https://github.com/xolvco/videoedit.git videoedit || {
              echo "::error::Unable to fetch xolvco/videoedit. Make the repo public or add a CROSS_REPO_TOKEN secret with read access."
              exit 1
            }
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./videoedit
          python -m pip install -e .[dev]

      - name: Run compatibility smoke tests
        run: >
          python -m pytest
          tests/test_command_coverage.py
          tests/test_manifests.py
          tests/test_service.py

  docs:
    name: Docs Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-docs.txt

      - name: Build docs
        run: python -m mkdocs build --strict
